<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BQT Procedural Knob Experiment</title>
  <style>
    :root {
      color-scheme: light;
      --faceplate: #ffadc6;
      --ink: #151214;
      --panel: #fff7ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7eef1;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    main {
      width: min(94vw, 760px);
      display: grid;
      gap: 16px;
    }

    .stage {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 760px;
      border: 1px solid rgba(36, 18, 24, 0.16);
      background: var(--faceplate);
      box-shadow: 0 18px 45px rgba(55, 20, 32, 0.18);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid rgba(36, 18, 24, 0.14);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(55, 20, 32, 0.08);
    }

    label,
    output {
      font-size: 14px;
      font-weight: 650;
      line-height: 1;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #151214;
    }
  </style>
</head>
<body>
  <main>
    <div class="stage">
      <canvas id="knobCanvas" width="900" height="900" aria-label="Procedural BQT-style cream knob on pink faceplate"></canvas>
    </div>
    <div class="controls">
      <label for="angle">Angle</label>
      <input id="angle" type="range" min="-150" max="150" value="-35" step="1">
      <output id="angleValue" for="angle">-35 deg</output>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("knobCanvas");
    const ctx = canvas.getContext("2d");
    const angleInput = document.getElementById("angle");
    const angleValue = document.getElementById("angleValue");

    const TAU = Math.PI * 2;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawFaceplateTexture(ctx, width, height) {
      ctx.save();
      ctx.fillStyle = "#ffadc6";
      ctx.fillRect(0, 0, width, height);

      const grainStep = 5;
      ctx.globalAlpha = 0.085;
      for (let y = 0; y < height; y += grainStep) {
        for (let x = 0; x < width; x += grainStep) {
          const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
          const tone = Math.floor(210 + (n - Math.floor(n)) * 45);
          ctx.fillStyle = `rgb(${tone}, ${Math.max(125, tone - 58)}, ${Math.max(148, tone - 34)})`;
          ctx.fillRect(x, y, 1.35, 1.35);
        }
      }

      const vignette = ctx.createRadialGradient(
        width * 0.5,
        height * 0.44,
        Math.min(width, height) * 0.18,
        width * 0.5,
        height * 0.5,
        Math.min(width, height) * 0.78
      );
      vignette.addColorStop(0, "rgba(255, 255, 255, 0.04)");
      vignette.addColorStop(0.55, "rgba(255, 255, 255, 0)");
      vignette.addColorStop(1, "rgba(94, 30, 50, 0.045)");
      ctx.globalAlpha = 1;
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function drawKnob(ctx, cx, cy, radius, angleRadians) {
      const skirtOuter = radius;
      const skirtInner = radius * 0.855;
      const topRadius = radius * 0.792;
      const grooveCount = 9;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleRadians);

      const skirtGradient = ctx.createRadialGradient(0, 0, radius * 0.46, 0, 0, radius);
      skirtGradient.addColorStop(0, "#fffaf0");
      skirtGradient.addColorStop(0.72, "#f8f0df");
      skirtGradient.addColorStop(1, "#ebe0ca");
      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter, 0, TAU);
      ctx.fillStyle = skirtGradient;
      ctx.fill();

      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter, 0, TAU);
      ctx.clip();
      ctx.globalAlpha = 0.22;
      for (let y = -skirtOuter; y <= skirtOuter; y += radius * 0.035) {
        for (let x = -skirtOuter; x <= skirtOuter; x += radius * 0.035) {
          const n = Math.sin((x + radius) * 18.724 + (y - radius) * 31.193) * 23143.91;
          const speck = n - Math.floor(n);
          if (speck > 0.63) {
            ctx.fillStyle = speck > 0.82 ? "rgba(255, 255, 248, 0.055)" : "rgba(80, 67, 49, 0.026)";
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
      ctx.restore();

      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter * 0.985, 0, TAU);
      ctx.strokeStyle = "rgba(255, 252, 240, 0.28)";
      ctx.lineWidth = radius * 0.018;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter * 0.998, 0, TAU);
      ctx.strokeStyle = "rgba(62, 48, 31, 0.11)";
      ctx.lineWidth = radius * 0.008;
      ctx.stroke();

      for (let i = 0; i < grooveCount; i++) {
        const a = i * TAU / grooveCount;
        const grooveWidth = radius * 0.255;
        const grooveRadius = grooveWidth * 0.5;
        const grooveCentre = skirtOuter * 0.955;

        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.arc(0, 0, skirtOuter * 0.985, 0, TAU);
        ctx.clip();

        ctx.beginPath();
        ctx.arc(0, -grooveCentre, grooveRadius, 0, TAU);
        ctx.fillStyle = "rgba(88, 72, 50, 0.058)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(0, -grooveCentre, grooveRadius * 0.92, Math.PI * 0.05, Math.PI * 0.95);
        ctx.strokeStyle = "rgba(72, 57, 38, 0.09)";
        ctx.lineWidth = radius * 0.009;
        ctx.lineCap = "round";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, -grooveCentre, grooveRadius * 0.88, Math.PI * 1.05, Math.PI * 1.95);
        ctx.strokeStyle = "rgba(255, 253, 243, 0.16)";
        ctx.lineWidth = radius * 0.008;
        ctx.lineCap = "round";
        ctx.stroke();
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter, 0, TAU);
      ctx.strokeStyle = "rgba(78, 64, 45, 0.06)";
      ctx.lineWidth = radius * 0.01;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 1.012, 0, TAU);
      ctx.strokeStyle = "rgba(66, 51, 32, 0.13)";
      ctx.lineWidth = radius * 0.026;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 1.006, 0, TAU);
      ctx.strokeStyle = "rgba(255, 253, 241, 0.24)";
      ctx.lineWidth = radius * 0.014;
      ctx.stroke();

      const topGradient = ctx.createRadialGradient(0, 0, topRadius * 0.18, 0, 0, topRadius);
      topGradient.addColorStop(0, "#fbf4e5");
      topGradient.addColorStop(0.86, "#faf2e1");
      topGradient.addColorStop(1, "#f3ead8");
      ctx.beginPath();
      ctx.arc(0, 0, topRadius, 0, TAU);
      ctx.fillStyle = topGradient;
      ctx.fill();

      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 0.985, 0, TAU);
      ctx.clip();
      ctx.globalAlpha = 0.16;
      for (let y = -topRadius; y <= topRadius; y += radius * 0.038) {
        for (let x = -topRadius; x <= topRadius; x += radius * 0.038) {
          const n = Math.sin((x - radius) * 21.311 + (y + radius) * 15.173) * 42173.37;
          const speck = n - Math.floor(n);
          if (speck > 0.68) {
            ctx.fillStyle = speck > 0.86 ? "rgba(255, 255, 248, 0.045)" : "rgba(80, 67, 49, 0.02)";
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
      ctx.restore();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 0.99, 0, TAU);
      ctx.strokeStyle = "rgba(255, 251, 232, 0.065)";
      ctx.lineWidth = radius * 0.005;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 0.93, 0, TAU);
      ctx.strokeStyle = "rgba(82, 67, 48, 0.012)";
      ctx.lineWidth = radius * 0.003;
      ctx.stroke();

      drawIndicatorSlot(ctx, radius);
      ctx.restore();
    }

    function roundedSlotPath(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawIndicatorSlot(ctx, radius) {
      const slotWidth = radius * 0.105;
      const slotLength = radius * 0.46;
      const slotInset = radius * 0.26;
      const x = -slotWidth * 0.5;
      const y = -slotInset - slotLength;

      ctx.save();
      roundedSlotPath(ctx, x - slotWidth * 0.19, y - slotWidth * 0.2, slotWidth * 1.38, slotLength + slotWidth * 0.4, slotWidth * 0.66);
      ctx.fillStyle = "rgba(255, 253, 239, 0.42)";
      ctx.fill();

      roundedSlotPath(ctx, x - slotWidth * 0.12, y - slotWidth * 0.12, slotWidth * 1.24, slotLength + slotWidth * 0.24, slotWidth * 0.6);
      ctx.fillStyle = "rgba(70, 54, 35, 0.12)";
      ctx.fill();

      roundedSlotPath(ctx, x, y, slotWidth, slotLength, slotWidth * 0.5);
      ctx.fillStyle = "#171312";
      ctx.shadowColor = "rgba(34, 25, 18, 0.2)";
      ctx.shadowBlur = radius * 0.006;
      ctx.shadowOffsetY = radius * 0.003;
      ctx.fill();

      roundedSlotPath(ctx, x + slotWidth * 0.18, y + slotWidth * 0.2, slotWidth * 0.22, slotLength - slotWidth * 0.42, slotWidth * 0.12);
      ctx.fillStyle = "rgba(255, 255, 255, 0.045)";
      ctx.shadowColor = "transparent";
      ctx.fill();
      ctx.restore();
    }

    function render() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      const size = Math.min(width, height);
      const angleDegrees = Number(angleInput.value);
      const angleRadians = angleDegrees * Math.PI / 180;

      angleValue.textContent = `${angleDegrees} deg`;
      drawFaceplateTexture(ctx, width, height);
      drawKnob(ctx, width * 0.5, height * 0.5, size * 0.31, angleRadians);
    }

    function redrawWithResize() {
      resizeCanvas();
      render();
    }

    angleInput.addEventListener("input", render);
    window.addEventListener("resize", redrawWithResize);
    redrawWithResize();
  </script>
</body>
</html>
