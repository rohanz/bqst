<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BQT Procedural Knob Experiment</title>
  <style>
    :root {
      color-scheme: light;
      --faceplate: #ffadc6;
      --ink: #151214;
      --panel: #fff7ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7eef1;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    main {
      width: min(94vw, 980px);
      display: grid;
      gap: 16px;
    }

    .stage {
      width: 100%;
      aspect-ratio: 1.35 / 1;
      max-height: 760px;
      border: 1px solid rgba(36, 18, 24, 0.16);
      background: var(--faceplate);
      box-shadow: 0 18px 45px rgba(55, 20, 32, 0.18);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid rgba(36, 18, 24, 0.14);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(55, 20, 32, 0.08);
    }

    label,
    output {
      font-size: 14px;
      font-weight: 650;
      line-height: 1;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #151214;
    }
  </style>
</head>
<body>
  <main>
    <div class="stage">
      <canvas id="knobCanvas" width="900" height="900" aria-label="Procedural BQT-style cream knob on pink faceplate"></canvas>
    </div>
    <div class="controls">
      <label for="angle">Angle</label>
      <input id="angle" type="range" min="-150" max="150" value="-35" step="1">
      <output id="angleValue" for="angle">-35 deg</output>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("knobCanvas");
    const ctx = canvas.getContext("2d");
    const angleInput = document.getElementById("angle");
    const angleValue = document.getElementById("angleValue");

    const TAU = Math.PI * 2;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawFaceplateTexture(ctx, width, height) {
      ctx.save();
      ctx.fillStyle = "#ffadc6";
      ctx.fillRect(0, 0, width, height);

      const grainStep = 5;
      ctx.globalAlpha = 0.055;
      for (let y = 0; y < height; y += grainStep) {
        for (let x = 0; x < width; x += grainStep) {
          const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
          const tone = Math.floor(210 + (n - Math.floor(n)) * 45);
          ctx.fillStyle = `rgb(${tone}, ${Math.max(125, tone - 58)}, ${Math.max(148, tone - 34)})`;
          ctx.fillRect(x, y, 1.2, 1.2);
        }
      }

      const vignette = ctx.createRadialGradient(
        width * 0.5,
        height * 0.44,
        Math.min(width, height) * 0.18,
        width * 0.5,
        height * 0.5,
        Math.min(width, height) * 0.78
      );
      vignette.addColorStop(0, "rgba(255, 255, 255, 0.055)");
      vignette.addColorStop(0.55, "rgba(255, 255, 255, 0)");
      vignette.addColorStop(1, "rgba(94, 30, 50, 0.055)");
      ctx.globalAlpha = 1;
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function drawKnob(ctx, cx, cy, radius, angleRadians) {
      const skirtOuter = radius;
      const skirtInner = radius * 0.855;
      const topRadius = radius * 0.792;
      const grooveCount = 9;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleRadians);

      const skirtGradient = ctx.createRadialGradient(0, 0, radius * 0.46, 0, 0, radius);
      skirtGradient.addColorStop(0, "#fffaf0");
      skirtGradient.addColorStop(0.72, "#f8f0df");
      skirtGradient.addColorStop(1, "#ebe0ca");
      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter, 0, TAU);
      ctx.fillStyle = skirtGradient;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter * 0.985, 0, TAU);
      ctx.strokeStyle = "rgba(255, 252, 240, 0.28)";
      ctx.lineWidth = radius * 0.018;
      ctx.stroke();

      for (let i = 0; i < grooveCount; i++) {
        const a = i * TAU / grooveCount;
        const grooveWidth = radius * 0.255;
        const grooveRadius = grooveWidth * 0.5;
        const grooveCentre = skirtOuter * 0.955;

        ctx.save();
        ctx.rotate(a);
        ctx.beginPath();
        ctx.arc(0, 0, skirtOuter * 0.985, 0, TAU);
        ctx.clip();

        ctx.beginPath();
        ctx.arc(0, -grooveCentre, grooveRadius, 0, TAU);
        ctx.fillStyle = "rgba(95, 79, 55, 0.052)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(0, -grooveCentre, grooveRadius * 0.88, Math.PI * 1.06, Math.PI * 1.94);
        ctx.strokeStyle = "rgba(255, 253, 243, 0.13)";
        ctx.lineWidth = radius * 0.007;
        ctx.lineCap = "round";
        ctx.stroke();
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, skirtOuter, 0, TAU);
      ctx.strokeStyle = "rgba(78, 64, 45, 0.06)";
      ctx.lineWidth = radius * 0.01;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 1.012, 0, TAU);
      ctx.strokeStyle = "rgba(75, 62, 43, 0.075)";
      ctx.lineWidth = radius * 0.022;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 1.006, 0, TAU);
      ctx.strokeStyle = "rgba(255, 253, 241, 0.19)";
      ctx.lineWidth = radius * 0.012;
      ctx.stroke();

      const topGradient = ctx.createRadialGradient(0, 0, topRadius * 0.18, 0, 0, topRadius);
      topGradient.addColorStop(0, "#fbf4e5");
      topGradient.addColorStop(0.86, "#faf2e1");
      topGradient.addColorStop(1, "#f3ead8");
      ctx.beginPath();
      ctx.arc(0, 0, topRadius, 0, TAU);
      ctx.fillStyle = topGradient;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 0.99, 0, TAU);
      ctx.strokeStyle = "rgba(255, 251, 232, 0.065)";
      ctx.lineWidth = radius * 0.005;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, topRadius * 0.93, 0, TAU);
      ctx.strokeStyle = "rgba(82, 67, 48, 0.012)";
      ctx.lineWidth = radius * 0.003;
      ctx.stroke();

      drawIndicatorSlot(ctx, radius);
      ctx.restore();
    }

    function roundedSlotPath(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawIndicatorSlot(ctx, radius) {
      const slotWidth = radius * 0.105;
      const slotLength = radius * 0.46;
      const slotInset = radius * 0.26;
      const x = -slotWidth * 0.5;
      const y = -slotInset - slotLength;

      ctx.save();
      roundedSlotPath(ctx, x, y, slotWidth, slotLength, slotWidth * 0.5);
      ctx.fillStyle = "#0f0c0d";
      ctx.shadowColor = "rgba(255, 249, 225, 0.45)";
      ctx.shadowBlur = radius * 0.018;
      ctx.shadowOffsetY = radius * 0.008;
      ctx.fill();

      roundedSlotPath(ctx, x + slotWidth * 0.18, y + slotWidth * 0.18, slotWidth * 0.28, slotLength - slotWidth * 0.36, slotWidth * 0.14);
      ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
      ctx.shadowColor = "transparent";
      ctx.fill();
      ctx.restore();
    }

    function drawRaisedBarKnob(ctx, cx, cy, radius, angleRadians) {
      const baseRadius = radius;
      const barWidth = radius * 0.42;
      const barHeight = radius * 1.62;
      const barRadius = barWidth * 0.35;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleRadians);

      const baseGradient = ctx.createRadialGradient(0, 0, baseRadius * 0.38, 0, 0, baseRadius);
      baseGradient.addColorStop(0, "#fffaf0");
      baseGradient.addColorStop(0.78, "#f8f0df");
      baseGradient.addColorStop(1, "#ebe0ca");
      ctx.beginPath();
      ctx.arc(0, 0, baseRadius, 0, TAU);
      ctx.fillStyle = baseGradient;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, 0, baseRadius * 0.99, 0, TAU);
      ctx.strokeStyle = "rgba(72, 58, 38, 0.07)";
      ctx.lineWidth = radius * 0.012;
      ctx.stroke();

      roundedSlotPath(ctx, -barWidth * 0.5 - radius * 0.012, -barHeight * 0.5 + radius * 0.014,
                      barWidth + radius * 0.024, barHeight, barRadius);
      ctx.fillStyle = "rgba(75, 62, 43, 0.055)";
      ctx.fill();

      roundedSlotPath(ctx, -barWidth * 0.5, -barHeight * 0.5, barWidth, barHeight, barRadius);
      ctx.fillStyle = "#f6ecd6";
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-barWidth * 0.38, -barHeight * 0.38);
      ctx.lineTo(-barWidth * 0.38, barHeight * 0.38);
      ctx.strokeStyle = "rgba(255, 255, 246, 0.08)";
      ctx.lineWidth = radius * 0.01;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(barWidth * 0.39, -barHeight * 0.36);
      ctx.lineTo(barWidth * 0.39, barHeight * 0.36);
      ctx.strokeStyle = "rgba(81, 66, 45, 0.035)";
      ctx.lineWidth = radius * 0.009;
      ctx.lineCap = "round";
      ctx.stroke();

      roundedSlotPath(ctx, -barWidth * 0.5 + radius * 0.018, -barHeight * 0.5 + radius * 0.02,
                      barWidth - radius * 0.036, barHeight - radius * 0.04, barRadius * 0.82);
      ctx.strokeStyle = "rgba(255, 254, 244, 0.10)";
      ctx.lineWidth = radius * 0.004;
      ctx.stroke();

      const tickWidth = radius * 0.105;
      const tickLength = radius * 0.46;
      const tickY = -barHeight * 0.5 + radius * 0.12;
      roundedSlotPath(ctx, -tickWidth * 0.5, tickY, tickWidth, tickLength, tickWidth * 0.48);
      ctx.fillStyle = "#0f0c0d";
      ctx.shadowColor = "rgba(255, 249, 225, 0.45)";
      ctx.shadowBlur = radius * 0.018;
      ctx.shadowOffsetY = radius * 0.008;
      ctx.fill();

      roundedSlotPath(ctx, -tickWidth * 0.32, tickY + tickWidth * 0.18, tickWidth * 0.28,
                      tickLength - tickWidth * 0.36, tickWidth * 0.14);
      ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
      ctx.shadowColor = "transparent";
      ctx.fill();

      ctx.restore();
    }

    function render() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      const size = Math.min(width, height);
      const angleDegrees = Number(angleInput.value);
      const angleRadians = angleDegrees * Math.PI / 180;

      angleValue.textContent = `${angleDegrees} deg`;
      drawFaceplateTexture(ctx, width, height);
      drawKnob(ctx, width * 0.33, height * 0.5, size * 0.27, angleRadians);
      drawRaisedBarKnob(ctx, width * 0.68, height * 0.5, size * 0.22, angleRadians);
    }

    function redrawWithResize() {
      resizeCanvas();
      render();
    }

    angleInput.addEventListener("input", render);
    window.addEventListener("resize", redrawWithResize);
    redrawWithResize();
  </script>
</body>
</html>
